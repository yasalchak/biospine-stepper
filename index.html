<title>BioSpine System Loop</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #ffffff; color: #1a1a1a; padding: 1.5rem; }
.progress-row { display: flex; align-items: center; margin-bottom: 1.5rem; }
.step-dot { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #ccc; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
.step-dot.active { background: #0D6E6E; border-color: #0D6E6E; color: #E1F5EE; }
.step-dot.done { background: #E1F5EE; border-color: #0F6E56; color: #085041; }
.step-line { flex: 1; height: 1px; background: #e0e0e0; }
.step-line.done { background: #0F6E56; }
.card { border: 1px solid #e8e8e8; border-radius: 12px; overflow: hidden; display: flex; min-height: 260px; }
.card-image { width: 200px; min-width: 200px; background: #ffffff; display: flex; align-items: center; justify-content: center; padding: 16px; border-right: 1px solid #f0f0f0; }
.card-image img { width: 100%; max-height: 170px; object-fit: contain; border-radius: 6px; }
.card-content { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; gap: 10px; }
.card-tag { font-size: 11px; font-weight: 600; color: #0F6E56; letter-spacing: 0.06em; text-transform: uppercase; }
.card-title { font-size: 19px; font-weight: 600; color: #0a1628; line-height: 1.3; }
.card-body { font-size: 13.5px; color: #555; line-height: 1.7; flex: 1; }
.card-insight { border-left: 2px solid #0D6E6E; padding: 8px 12px; background: #E1F5EE; border-radius: 0 8px 8px 0; font-size: 12.5px; color: #085041; font-style: italic; }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
.nav-label { font-size: 12px; color: #aaa; }
button { padding: 7px 16px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; color: #333; }
button:hover { background: #f4f4f4; }
button:disabled { opacity: 0.35; cursor: default; }
</style>

const steps = [{"tag": "Step 1 — Motor imagery", "title": "The patient thinks about moving", "body": "Every session begins with an attempt. The patient is asked to try to cycle – to engage as fully as possible in the intention and effort of producing that movement. Depending on the completeness of their injury, this attempt may or may not produce any volitional activation of the lower limb muscles. For someone with a complete injury, no movement will occur. For someone with an incomplete injury, there may be partial, weak, or inconsistent muscle activation. <strong>In both cases, the neural effort is real</strong> – the brain is generating motor commands, recruiting the same cortical networks it would use to produce actual movement.<br><br>We refer to the mental engagement involved in this attempt as <strong>motor imagery</strong>. It is the electrical signature of that effort – recorded from the sensorimotor cortex – that provides the starting point for everything the system does next.", "insight": "Motor imagery is sometimes described as simply “thinking about movement” – but this understates what is happening in the nervous system. Neuroimaging research has shown that motor imagery activates many of the same cortical regions as actual movement execution – including the primary motor cortex, supplementary motor area, and premotor cortex (Miller et al., 2010). The neural networks responsible for movement are engaged whether or not movement occurs.<br><br>This has a direct implication for how BioSpine works. For individuals with SCI, voluntary movement may be absent – but the cortical engagement that motor imagery produces is not. The brain is doing the work whether or not the body can respond. This is why the EEG signal provides a meaningful input to the system, and why the quality of the patient’s engagement during motor imagery directly affects what the system can detect and respond to.", "img": "data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJT se that follows.", "insight": "Switching strategies mid-calibration (for example, shifting from imagining the sensation of pedalling to visualising the scenery) introduces variability that makes it harder for the classifier to identify a stable, repeatable pattern. The clinician’s role during calibration is to coach and guide the patient toward a consistent, focused approach, and to maintain that consistency into the online phase that follows.", "img": "data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCADrAPMDASIAAhEBAxEB/8QAHQAAAQQDAQEAAAAAAAAAAAAAAAUGBwgCAwQJAf/EAFcQAAEDAwQABAMCCgcCBw0JAAECAwQFBhEABxIhCBMxQRQiUTJhFSMzQlJTcXKBkgkWN2J1kcMXJCVDVnahtNE0NjhVgoOUorGzwdLwV3SVsrXCxNPU/8QAFAEBAAAAAAAAAAAAAAAAAAAAAP/EABQRAQAAAAAAAAAAAAAAAAAAAAD/2gAMAwEAAhEDEQA/ALiNR2PKR+Ia+yPzBrP4eP8AqGv5BrJn8kj90ay0Gv4eP+oa/kGj4eP+oa/kGtmjQa/h4/6hr+QaPh4/6hr+Qa2aNBr+Hj/qGv5Bo+Hj/qGv5BrZo0Gv4eP+oa/kGj4eP+oa/kGtmjQa/h4/6hr+QaPh4/6hr+Qa2a1OyY7Ud2Q4+2llkKLqyoYQE+uT7Y0H34eP+oa/kGj4eP8AqGv5BphbW7y7f7l1SoUy0qwuXLgJ8xxt2Otorb5ceaOQHJOcfeMjI71IOg1/Dx/1DX8g0fDx/wBQ1/INVshby7kV+23ahbFAn1F1NDkIDsahPLYNXRKCQhKj0UBoKyQSMjs5607p2417i4B8JalzKphuRpJ5W69yFK+DHmK9M8/ic/fj2I0Ey/Dx/wBQ1/INHw8f9Q1/INQrszuf +ymrf/bHuT/6ZE//AM+nq7a1suzIkxy3aSuTCd86K6YbfNlzGOSDjKTg+o0saCM6TtH8JelDuio7g3nXX6K485Fj1KQwtrk60ppWQhlJ+yo++pM0aNAaNGjQGjRo0Bo0aNAaNGjQYs/kkfujWWsWfySP3RrLQGjRo0Bo0aNAaNGjQGjRo0Bo0aNAaSLpti3Lqhtw7lodOrEZpfmNtTY6XUpVgjICgcHBI/jpX0aCqu4nhItyXXavLtOmiLDdokhUJhVQWA3UyseV0QcNceWRn10nTPCFShVj8LCdME1yFjlUzyTTfIT8V+b2553Lj9xGrd6NBAmx/hssW1rcS7dNq06qV55bofVLX8U0hvzl+VwChxB8vhk4znPep6SAlISkAADAA9tfdGgNGjRoDRo0aA0aNGgNGjRoDRo0aA0aNGgNGjRoP//Z"}, {"tag": "Step 4 — Computation and output", "title": "The Digital Twin drives the devices", "body": "When the BCI classifies the participant’s intent as cycling, that signal passes to the <strong>Digital Twin</strong> – the system’s real-time controller. The Digital Twin is a computational neuromusculoskeletal model: a physics-based representation of the human neural and musculoskeletal systems that calculates, in real time, how to coordinate the external assistance devices to produce cycling movement.<br><br>Two output devices are used to provide movement assistance: <strong>functional electrical stimulation (FES)</strong> and a <strong>motorised cycling ergometer</strong>.<br><br><ul style=\"margin:0 0 10px 16px; padding:0; list-style:disc;\"><li style=\"margin-bottom:6px;\">FES works by delivering small, controlled electrical pulses through electrodes placed over the major lower-limb muscle groups (quadriceps, hamstrings, tibialis anterior, and gastrocnemius). This activates the underlying motor nerves and causes the muscles to contract, producing movement in the lower limbs.</li><li style=\"margin-bottom:6px;\">The cycling ergometer is a motorised stationary cycle that provides mechanical support – assisting the pedalling motion where FES-evoked contractions alone are insufficient to complete the full pedal stroke, and constraining the movement within a safe, defined pathway.</li></ul>Together, these two devices produce the coordinated cycling movement that the participant’s motor imagery has initiated.<br><br>What the Digital Twin calculates is not simply how much stimulation to deliver, but <em>how</em> to deliver it. The FES system and ergometer are not operating as separate interventions. They are running as an integrated system, coordinated moment by moment by the Digital Twin controller.", "insight": "The Digital Twin removes the guesswork from FES parameter setting. Stimulation is calculated individually for each patient at each moment, rather than configured manually by the clinician.", "img": "data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAD/AVoDASIAAhEBAxEB/8QAHAABAAIDAQEBAAAAAAAAAAAAAAUGAQQHAwII/8QATRAAAQMDAAQHDQUGBQIGAwAAAQACAwQFEQYSITETFCJBUWGSBxUWMlJUcYGRobHB0SNCU5OiMzRDYnLhF0RVgoMlRSRkc5Sj8GOEwv/EABoBAQADAQEBAAAAAAAAAAAAAAABAgMEBQb/xAAvEQEAAgECBAQFBAIDAAAAAAAAAQIRAyEEEjFBE1FhoSJxsdHwBRQygRXxI5HB/9oADAMBAAIRAxEAPwDuCIiAiIgIiICIiAiIgIpeOxVBpxJK8RvIyGc4HWoavpq2mc7VljOOZzUH0ih4b5GytFHcIxTSOIDJM5jcejPMfSphAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQFvWOlbVXGNsn7JnLk9A5loryrKuuo4OFoIhK/WAkbnbqc+OkoLlWVgLnu1t+5UXSK9Mhle0uBA3r5tGl1ovJk4pVh8seS5mQc/0nnAOz4rm9bXV94t9XWQwBobMWBsZdJvLtXOBsPJPSN21B7324yXWmq3Qx67YY9d2PujpXQNGqp1bo9QVb3az5YGlx6TjB+C5rYJbbQ6KV9oulW t signal. The VR environment layers congruent visual feedback on top: the avatar’s cycling motion matches the timing and rhythm of the physical movement, creating a multi-modal sensory experience that is coherent across modalities.<br><br>When the participant imagines resting, stimulation and mechanical assistance reduce and the avatar slows. When they re-engage with motor imagery, the loop begins again. <strong>This continuous, intention-contingent cycle – intention driving movement, movement generating congruent feedback, feedback reinforcing the next cycle of intention – is what distinguishes BioSpine from systems that simply deliver stimulation on a timer.</strong>", "insight": "The VR is not motivational decoration. It is the mechanism by which the system closes the sensory feedback loop that spinal cord injury opened.", "img": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAJYAlgDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDwkYIIPWjpRn9KKBBRS4pKAClooFAC9qMcUZooAKUAnpSU4ccg0AKp7YyPSp0CrKCRuU/zquPUdqmjy/IyMcn3piLsVu1xeI8spHnMSzFS5Pvgc16xYxRQ2MEcChYljGwAEADHoefz5rhNAu0e2lgla6muFwbeOIE7cc5BPC8gc9hXdac5e1Xe5aUAGTMm8BiOgbvQUjI8Q+GYtant5lYxTq4WSUH+Dnt3OcYrkNWsGsnhhnBN3vee8lVvlaMuArHH59OM16hisbW9FivYLy4RSbmS0aAAfxchh+OR+tA2jG0     if (i > 0) {
      const line = document.createElement("div");
      line.className = "step-line" + (i <= current ? " done" : "");
      dotsEl.appendChild(line);
    }
    const dot = document.createElement("div");
    dot.className = "step-dot" + (i === current ? " active" : i < current ? " done" : "");
    dot.textContent = i + 1;
    dot.onclick = () => { current = i; render(); };
    dotsEl.appendChild(dot);
  });
}
function go(dir) {
  current = Math.max(0, Math.min(steps.length - 1, current + dir));
  render();
}
render();
</script>
</body>
</html>
