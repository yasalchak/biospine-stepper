* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #ffffff; color: #1a1a1a; padding: 1.5rem; }
.progress-row { display: flex; align-items: center; margin-bottom: 1.5rem; }
.step-dot { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #ccc; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
.step-dot.active { background: #0D6E6E; border-color: #0D6E6E; color: #E1F5EE; }
.step-dot.done { background: #E1F5EE; border-color: #0F6E56; color: #085041; }
.step-line { flex: 1; height: 1px; background: #e0e0e0; }
.step-line.done { background: #0F6E56; }
.card { border: 1px solid #e8e8e8; border-radius: 12px; overflow: hidden; display: flex; min-height: 260px; }
.card-image { width: 200px; min-width: 200px; background: #ffffff; display: flex; align-items: center; justify-content: center; overflow: hidden; border-right: 1px solid #f0f0f0; padding: 12px; }
.card-image img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
.card-content { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; gap: 10px; }
.card-tag { font-size: 11px; font-weight: 600; color: #0F6E56; letter-spacing: 0.06em; text-transform: uppercase; }
.card-title { font-size: 19px; font-weight: 600; color: #0a1628; line-height: 1.3; }
.card-body { font-size: 13.5px; color: #555; line-height: 1.7; flex: 1; }
.card-insight { border-left: 2px solid #0D6E6E; padding: 8px 12px; background: #E1F5EE; border-radius: 0 8px 8px 0; font-size: 12.5px; color: #085041; font-style: italic; }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
.nav-label { font-size: 12px; color: #aaa; }
button { padding: 7px 16px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; color: #333; }
button:hover { background: #f4f4f4; }
button:disabled { opacity: 0.35; cursor: default; }
</style>

    tag: "Step 4 — Computation and output",
    title: "The Digital Twin drives the devices",
    body: "When the BCI classifies a cycling intention, that signal is passed to the Digital Twin — a personalised computational model of the patient's neuromuscular system. The Digital Twin calculates, in real time, the precise stimulation parameters and mechanical assistance needed to produce coordinated cycling movement. Those instructions drive two output devices simultaneously: the FES system delivers electrical pulses to the leg muscles, and the cycling ergometer provides coordinated mechanical support.",

  {
    tag: "Step 5 — Sensory feedback",
    title: "The loop closes through VR",
    body: "As the movement occurs, the patient's avatar in the virtual reality environment cycles through a virtual landscape — contingent on their own motor imagery. This provides immediate visual and sensory feedback that the intention produced a consequence. That feedback re-enters the patient's sensorimotor system, reinforcing their motor imagery and sustaining the quality of the neural signal for the next cycle of the loop. When the patient imagines resting, stimulation and assistance reduce. When they imagine cycling again, the loop begins again.",
    insight: "The VR is not motivational decoration. It is the mechanism by which the system closes the sensory feedback loop that spinal cord injury opened.",

let current = 0;

function render() {
  const s = steps[current];
  document.getElementById('card').innerHTML = `
    <div class="card-image"><img src="${s.img}" alt="${s.tag}"></div>
    <div class="card-content">
      <div class="card-tag">${s.tag}</div>
      <div class="card-title">${s.title}</div>
      <div class="card-body">${s.body}</div>
      <div class="card-insight">${s.insight}</div>
    </div>
  `;
  document.getElementById('counter').textContent = `Step ${current + 1} of ${steps.length}`;
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === steps.length - 1;

  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  steps.forEach((_, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = 'step-line' + (i <= current ? ' done' : '');
      dotsEl.appendChild(line);
    }
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i === current ? ' active' : i < current ? ' done' : '');
    dot.textContent = i + 1;
    dot.onclick = () => { current = i; render(); };
    dotsEl.appendChild(dot);
  });
}

function go(dir) {
  current = Math.max(0, Math.min(steps.length - 1, current + dir));
  render();
}

render();
</script>
